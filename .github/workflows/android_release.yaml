name: Android Release APK

on:
  push:
    branches:
      - master # Atau 'main', tergantung nama branch utama repository kamu

permissions:
  contents: write

jobs:
  build_apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17' # Flutter 3.x+ merekomendasikan Java 17

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Build Android APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: kurir-santuy-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  create_release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build_apk # Pastikan APK sudah selesai di-build sebelum membuat release

    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: kurir-santuy-apk

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Token otomatis dari GitHub Actions
        with:
          tag_name: v${{ github.run_number }} # Contoh tag: v1, v2, v3, dst.
          release_name: Kurir Santuy v${{ github.run_number }}
          body: |
            🚀 Rilis Otomatis Kurir Santuy v${{ github.run_number }}
            Perubahan terbaru dari commit: ${{ github.event.head_commit.message }}
          draft: false
          prerelease: false

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: app-release.apk # Nama file APK yang di-download
          asset_name: KurirNyantuy-v${{ github.run_number }}.apk
          asset_content_type: application/vnd.android.package-archive